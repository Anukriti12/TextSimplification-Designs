<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Activity 3: Audio</title><link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B3557;--teal:#2A9D8F;--teal-light:#E8F5F4;--teal-mid:#A8DAD5;--warm:#FAF8F5;--text:#2D3748;--muted:#8896A7;--border:#DDD6CC;--gold:#E9A03B;--violet:#6C63AC;--violet-light:#F0EFF9}
html,body{height:100%;background:#E0DBD3;font-family:'DM Sans',sans-serif;color:var(--text)}
.banner{background:#0F1923;padding:10px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:2px solid #7C3AED}
.b-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#C4B5FD}
.b-title{font-size:13px;font-weight:600;color:#fff}
.b-sep{color:rgba(255,255,255,.2)}
.b-desc{font-size:11px;color:rgba(255,255,255,.4);max-width:420px;text-align:right;line-height:1.4}
.page{max-width:860px;margin:0 auto;background:var(--warm);box-shadow:0 0 60px rgba(0,0,0,.12);display:flex;flex-direction:column;min-height:calc(100vh - 46px)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:52px;background:var(--navy);flex-shrink:0}
.org{font-size:12px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase}
.doc-header{background:var(--navy);padding:18px 40px 22px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.doc-lbl{display:inline-flex;align-items:center;gap:6px;background:rgba(42,157,143,.18);border:1px solid rgba(42,157,143,.4);color:var(--teal-mid);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.doc-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal)}
.doc-header h1{font-family:'Lora',serif;font-size:22px;font-weight:700;color:#fff;line-height:1.25}
.scroll{flex:1;overflow-y:auto;padding:32px 40px 36px}
.s-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;margin-top:22px}
.s-head{font-family:'Lora',serif;font-size:19px;font-weight:700;color:var(--navy);padding-bottom:8px;border-bottom:2px solid var(--teal-light);margin-bottom:2px}
.p{font-family:'Lora',serif;font-size:17px;line-height:1.95;color:var(--text);margin-top:12px}
.divider{border:none;border-top:1px dashed var(--border);margin:24px 0}
.action-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:var(--warm);border-top:1px solid var(--border);flex-shrink:0}
.btn-back{display:flex;align-items:center;gap:8px;background:transparent;color:var(--navy);border:1.5px solid var(--border);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-back:disabled{opacity:.3;cursor:default}
.btn-back svg,.btn-next svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-next{display:flex;align-items:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:100px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.sub-nav{background:#162130;display:flex;padding:0 40px;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:46px;z-index:299}
.tab{padding:14px 20px 12px;font-size:13px;font-weight:600;color:rgba(255,255,255,.38);cursor:pointer;border-bottom:3px solid transparent;user-select:none;transition:color .15s}
.tab:hover{color:rgba(255,255,255,.7)}
.tab.active{color:#fff;border-bottom-color:#7C3AED}
.pane{display:none;flex:1;overflow:hidden;flex-direction:column}
.pane.active{display:flex}
.read-bar{background:var(--navy);padding:14px 40px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.07)}
.read-btn{display:flex;align-items:center;gap:9px;background:#7C3AED;color:#fff;border:none;border-radius:100px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.read-btn.playing{background:var(--teal)}
.read-btn svg{width:17px;height:17px;fill:#fff;flex-shrink:0}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px}
.prog-fill{height:100%;background:#7C3AED;border-radius:2px;width:0%}
.word{display:inline;border-radius:2px;padding:0 1px}
.sent{display:inline}
.mode-word .word.hl{background:#FEF08A}
.mode-sent .sent.hl{background:#DCFCE7;border-radius:4px;padding:1px 2px}
.mode-dual .sent.hl{background:#DCFCE7;border-radius:4px;padding:1px 2px}
.mode-dual .sent.hl .word.hl{background:#86EFAC}
.para-block{margin-bottom:4px;border-left:3px solid transparent;padding-left:12px;transition:border-color .2s;border-radius:0 6px 6px 0}
.para-block.reading{border-left-color:var(--teal);background:#F5FFFC}
.para-play{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1.5px solid rgba(124,58,237,.35);color:#7C3AED;border-radius:100px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:all .15s}
.para-play:hover,.para-play.on{background:#7C3AED;color:#fff;border-color:#7C3AED}
</style></head><body>
<div class="banner">
  <div style="display:flex;align-items:center;gap:10px"><span class="b-tag">Activity 3</span><span class="b-sep">/</span><span class="b-title">Audio and Highlighting</span></div>
  <div class="b-desc">Choose how text is highlighted while the page is read to you. The document stays the same.</div>
</div>
<div class="sub-nav">
  <div class="tab active" id="tab-a" onclick="sw('a')">Word by Word</div>
  <div class="tab" id="tab-b" onclick="sw('b')">Full Sentence</div>
  <div class="tab" id="tab-c" onclick="sw('c')">Word and Sentence</div>
  <div class="tab" id="tab-d" onclick="sw('d')">Section by Section</div>
</div>
<div class="page">
  <div class="top-bar"><span class="org">National Institutes of Health</span><span style="font-size:12px;color:var(--teal-mid);font-weight:500" id="step-info">Press Read to hear this page</span></div>
  <div class="read-bar" id="read-bar">
    <button class="read-btn" id="read-btn" onclick="togglePlay()">
      <svg id="read-ico" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <span id="read-lbl">Read this to me</span>
    </button>
    <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  </div>
  <div class="doc-header" id="doc-hdr"></div>
  <div id="pane-a" class="pane active"><div class="scroll"><div id="body-a"></div></div></div>
  <div id="pane-b" class="pane"><div class="scroll"><div id="body-b"></div></div></div>
  <div id="pane-c" class="pane"><div class="scroll"><div id="body-c"></div></div></div>
  <div id="pane-d" class="pane"><div class="scroll"><div id="body-d"></div></div></div>
  <div class="action-bar">
    <button class="btn-back" id="btn-back" onclick="step(-1)" disabled><svg viewBox="0 0 24 24"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>Back</button>
    <button class="btn-next" id="btn-next" onclick="step(1)">Next<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
  </div>
</div>
<script>

const ALL={"original": [{"label": "What Is Type 2 Diabetes?", "body": "Type 2 diabetes, the most common type of diabetes, is a disease that occurs when your blood glucose, also called blood sugar, is too high. Blood glucose is your main source of energy and comes mainly from the food you eat. Insulin, a hormone made by the pancreas, helps glucose get into your cells to be used for energy. In type 2 diabetes, your body does not make enough insulin or does not use insulin well. Too much glucose then stays in your blood, and not enough reaches your cells."}, {"label": "Health Problems Caused by Diabetes", "body": "Over time, having too much glucose in your blood can cause health problems such as heart disease, nerve damage, eye problems, and kidney disease. You are more likely to develop type 2 diabetes if you have a family history of diabetes, are overweight or have obesity, or are 35 or older. Many people with type 2 diabetes have no symptoms, or symptoms can be so mild that people might not even notice them."}, {"label": "Managing Your Diabetes", "body": "Managing your blood glucose, blood pressure, and cholesterol, and quitting smoking if you smoke, are important ways to manage your type 2 diabetes. Lifestyle changes that include planning healthy meals, limiting calories if you are overweight, and being physically active are also part of managing your diabetes. So is taking any prescribed medicines. Take your medicines as they were prescribed, even if you feel good or have reached your blood glucose, blood pressure, or cholesterol goals. Talk with your health care team if you cannot afford your medicines or if you experience any side effects."}], "plain": [{"label": "What Is Type 2 Diabetes?", "body": "Type 2 diabetes is a health condition where your blood sugar is too high. Blood sugar, also called glucose, comes from the food you eat. Your body uses a hormone called insulin to move sugar from your blood into your cells, where it is used for energy. In type 2 diabetes, your body does not make enough insulin or does not use it well. When this happens, too much sugar stays in your blood."}, {"label": "Health Problems Caused by Diabetes", "body": "If your blood sugar stays high for a long time, it can damage your heart, kidneys, eyes, and nerves. You are more likely to develop type 2 diabetes if you have a family member with diabetes, if you are overweight, or if you are 35 or older. Many people do not know they have diabetes because they feel no different at first."}, {"label": "Managing Your Diabetes", "body": "You can manage type 2 diabetes by eating healthy food, being physically active, and taking any medicines your doctor prescribes. Keep your blood sugar, blood pressure, and cholesterol at healthy levels. If you smoke, quitting will help. Take your medicines every day, even if you feel well. Do not stop taking them without talking to your doctor first. If your medicine is too expensive or causes side effects, tell your health care team."}], "easy": [{"label": "What Is Type 2 Diabetes?", "body": "Type 2 diabetes is a health condition. It means your blood sugar is too high. Blood sugar comes from the food you eat. Your body uses insulin to move blood sugar into your cells. In type 2 diabetes, insulin does not work well enough. Too much sugar stays in your blood."}, {"label": "Health Problems Caused by Diabetes", "body": "High blood sugar can damage your body over time. It can affect your heart, kidneys, eyes, and nerves. You are more likely to get diabetes if a family member has it. You are more likely to get it if you are overweight. Many people do not know they have it at first."}, {"label": "Managing Your Diabetes", "body": "Eat healthy food every day. Move your body regularly. Take your medicine every day, even if you feel well. Do not stop taking your medicine without asking your doctor. If your medicine costs too much or makes you feel unwell, tell your doctor or nurse."}]};
const KP_ALL={"original": ["Type 2 diabetes occurs when blood glucose is too high due to insufficient or ineffective insulin", "Over time, high blood glucose causes heart disease, nerve damage, eye problems, and kidney disease", "Management includes healthy eating, physical activity, and taking prescribed medicines", "Take medicines as prescribed even when you feel well; discuss side effects with your team"], "plain": ["Blood sugar is too high because insulin is not working properly", "High blood sugar over time can damage your heart, kidneys, eyes, and nerves", "Eat healthy, stay active, and take your medicines every day", "Tell your doctor if you cannot afford your medicine or have side effects"], "easy": ["Blood sugar is too high in type 2 diabetes", "High blood sugar can damage your heart, kidneys, eyes, and nerves", "Take your medicine every day, even if you feel well", "Tell your doctor if your medicine is too expensive or makes you feel unwell"]};
const DEFS={"blood glucose": {"term": "Blood glucose", "plain": "The amount of sugar in your blood. Also called blood sugar.", "example": "A blood glucose test measures how much sugar is in your blood at that moment."}, "insulin": {"term": "Insulin", "plain": "A hormone made by the pancreas that helps sugar get from your blood into your cells to be used for energy.", "example": "In type 2 diabetes, the body either does not make enough insulin or does not use it properly."}, "pancreas": {"term": "Pancreas", "plain": "An organ in your body that makes insulin and helps digest food.", "example": "The pancreas releases insulin when your blood sugar rises after a meal."}, "cholesterol": {"term": "Cholesterol", "plain": "A fatty substance in your blood. Too much can lead to heart disease.", "example": "Eating less saturated fat and exercising regularly can help keep cholesterol at a healthy level."}};
const EXPLS={"p0": {"what": "You do not need to do anything right now except read this information. If you have diabetes, keep following your care plan.", "mean": "This section explains what type 2 diabetes is and why it happens. It is a condition where the body cannot manage blood sugar properly.", "why": "Understanding what diabetes is helps you understand why the medicines and lifestyle changes your doctor recommends are important."}, "p1": {"what": "Talk to your doctor about getting regular checks of your blood sugar, blood pressure, eyes, kidneys, and feet.", "mean": "High blood sugar builds up damage slowly and quietly. You may feel fine even when damage is happening. Regular check-ups catch problems early.", "why": "Finding problems early means they can be treated before they become serious. This protects your vision, kidneys, and heart."}, "p2": {"what": "Take your diabetes medicines every day as prescribed. Eat healthy meals. Move your body regularly. See your doctor for regular check-ups.", "mean": "Managing diabetes is a daily routine. Small consistent actions, like taking medicine and eating well, have a big effect over time.", "why": "Good management prevents or delays the serious complications of diabetes. People who manage their diabetes well often live long, active lives."}};
const DOC_TITLE="Understanding Type 2 Diabetes";
const DOC_TYPE="Health Information Pamphlet";
const ORG="National Institutes of Health";
const CHAT_WELCOME="Hello. I can help you understand this diabetes information. What would you like to know?";
function getLevel(){try{var s=localStorage.getItem('selectedLevel');if(s){var v=JSON.parse(s);if(ALL[v])return v;}}catch(e){}return 'original';}
function getSecs(){return ALL[getLevel()];}
function getKP(){return KP_ALL[getLevel()]||KP_ALL.original;}
function renderHdr(id){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div class="doc-lbl">'+DOC_TYPE+'</div><h1>'+DOC_TITLE+'</h1>';}
function renderBody(id){var el=document.getElementById(id);if(!el)return;el.innerHTML='';getSecs().forEach(function(sec,i){if(i>0){var hr=document.createElement('hr');hr.className='divider';el.appendChild(hr);}var d=document.createElement('div');d.innerHTML='<div class="s-lbl">'+sec.label+'</div><p class="p">'+sec.body+'</p>';el.appendChild(d);});}
function renderKP(id,style){var el=document.getElementById(id);if(!el)return;el.innerHTML='';var kp=getKP();if(style==='chips'){var div=document.createElement('div');div.className='chips';kp.forEach(function(k){var sp=document.createElement('span');sp.className='chip';sp.textContent=k;div.appendChild(sp);});el.appendChild(div);}else{var ul=document.createElement('ul');ul.className='kp-list';kp.forEach(function(k){var li=document.createElement('li');li.textContent=k;ul.appendChild(li);});el.appendChild(ul);}}
function save(key,val){var pid=localStorage.getItem('participantId')||'session';localStorage.setItem(key,JSON.stringify(val));localStorage.setItem(pid+'__'+key,JSON.stringify(val));}
function updateNav(tabs,cur){var idx=tabs.indexOf(cur);var bb=document.getElementById('btn-back'),bn=document.getElementById('btn-next');if(bb)bb.disabled=(idx===0);if(bn)bn.textContent=(idx===tabs.length-1)?'Done':'Next ›';}

var TABS=['a','b','c','d'],curMode='a';
var synth=window.speechSynthesis,isPlaying=false,words=[],wi=0,simInt=null,fullText='',paraOn=null;
function toSents(t){return t.match(/[^.!?]+[.!?]+/g)||[t];}
function wrapSpans(text){
  return toSents(text).map(function(s){
    var ws=s.trim().split(/\s+/).map(function(w){return '<span class="word">'+w+'</span>';}).join(' ');
    return '<span class="sent">'+ws+' </span>';
  }).join('');
}
function buildMode(m){
  var area=document.getElementById('body-'+m);if(!area)return;area.innerHTML='';
  var secs=getSecs();
  var mc={a:'mode-word',b:'mode-sent',c:'mode-dual'}[m]||'';
  secs.forEach(function(sec,i){
    if(i>0){var hr=document.createElement('hr');hr.className='divider';area.appendChild(hr);}
    var d=document.createElement('div');
    if(m==='d'){
      d.className='para-block';d.id='pb'+i;
      var lb=document.createElement('div');lb.className='s-lbl';lb.textContent=sec.label;
      var p=document.createElement('p');p.className='p';p.textContent=sec.body;
      var pb=document.createElement('button');pb.className='para-play';pb.id='pp'+i;
      pb.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play this section';
      (function(bi,ppi,txt){pb.onclick=function(){playPara(bi,ppi,txt);};}('pb'+i,'pp'+i,sec.body));
      d.appendChild(lb);d.appendChild(p);d.appendChild(pb);
    }else{
      d.innerHTML='<div class="s-lbl">'+sec.label+'</div><p class="p '+mc+'">'+wrapSpans(sec.body)+'</p>';
    }
    area.appendChild(d);
  });
}
function collectWords(m){
  words=[];
  var area=document.getElementById('body-'+m);
  if(area)area.querySelectorAll('.word').forEach(function(w){words.push(w);});
}
function init(){
  renderHdr('doc-hdr');
  ['a','b','c','d'].forEach(buildMode);
  collectWords('a');
  fullText=getSecs().map(function(s){return s.body;}).join(' ');
  updateNav(TABS,curMode);
}
function sw(m){
  curMode=m;save('choiceTTS',m);
  TABS.forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('active',x===m);
    document.getElementById('pane-'+x).classList.toggle('active',x===m);
  });
  document.getElementById('read-bar').style.display=m==='d'?'none':'flex';
  stopAll();collectWords(m);
  updateNav(TABS,curMode);
  document.getElementById('step-info').textContent={a:'Word by word',b:'Full sentence',c:'Word and sentence',d:'Tap a section to hear it'}[m];
}
function step(d){var idx=TABS.indexOf(curMode),n=idx+d;if(n>=0&&n<TABS.length)sw(TABS[n]);}
function pickVoice(){
  var vv=synth.getVoices();
  var pref=['Samantha','Karen','Daniel','Google US English','Microsoft Aria','Alex'];
  for(var i=0;i<pref.length;i++){var v=vv.find(function(x){return x.name===pref[i];});if(v)return v;}
  return vv.find(function(v){return v.lang==='en-US'||v.lang==='en-GB';})||null;
}
function togglePlay(){if(isPlaying){stopAll();return;}start();}
function start(){
  stopAll();isPlaying=true;setState(true);wi=0;
  var u=new SpeechSynthesisUtterance(fullText);u.rate=0.82;u.pitch=1.05;
  var voice=pickVoice();if(voice)u.voice=voice;
  u.onboundary=function(e){
    if(e.name!=='word')return;
    var cc=0,found=0;fullText.split(/\s+/).forEach(function(w,i){if(cc<=e.charIndex)found=i;cc+=w.length+1;});
    if(found<words.length){wi=found;hl(found);document.getElementById('prog').style.width=((found/Math.max(1,words.length))*100)+'%';};
  };
  u.onend=function(){stopAll();document.getElementById('step-info').textContent='Done.';setState(false);};
  u.onerror=sim;synth.speak(u);
  setTimeout(function(){if(isPlaying&&wi===0&&words.length>0)sim();},900);
}
function sim(){
  if(simInt)clearInterval(simInt);
  var total=words.length,ms=Math.max(90,fullText.split(/\s+/).length/0.82*1000/Math.max(1,total));
  simInt=setInterval(function(){if(!isPlaying){clearInterval(simInt);return;}if(wi>=total){stopAll();return;}hl(wi);document.getElementById('prog').style.width=((wi/total)*100)+'%';wi++;},ms);
}
function hl(idx){
  document.querySelectorAll('.word.hl').forEach(function(w){w.classList.remove('hl');});
  document.querySelectorAll('.sent.hl').forEach(function(s){s.classList.remove('hl');});
  if(idx>=words.length)return;
  words[idx].classList.add('hl');
  var sent=words[idx].closest('.sent');if(sent)sent.classList.add('hl');
}
function stopAll(){
  isPlaying=false;synth.cancel();clearInterval(simInt);
  document.querySelectorAll('.word.hl,.sent.hl').forEach(function(el){el.classList.remove('hl');});
  setState(false);document.getElementById('prog').style.width='0%';
  document.getElementById('step-info').textContent='Press Read to hear this page';
}
function setState(on){
  var btn=document.getElementById('read-btn'),lbl=document.getElementById('read-lbl'),ico=document.getElementById('read-ico');
  btn.classList.toggle('playing',on);
  lbl.textContent=on?'Stop reading':'Read this to me';
  ico.innerHTML=on?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>':'<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}
function playPara(bid,ppid,text){
  if(paraOn===ppid){synth.cancel();document.getElementById(bid).classList.remove('reading');document.getElementById(ppid).classList.remove('on');document.getElementById(ppid).innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play this section';paraOn=null;return;}
  if(paraOn){var op=document.getElementById(paraOn);if(op){op.classList.remove('on');op.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play this section';}document.querySelectorAll('.para-block.reading').forEach(function(b){b.classList.remove('reading');});synth.cancel();}
  paraOn=ppid;document.getElementById(bid).classList.add('reading');document.getElementById(ppid).classList.add('on');document.getElementById(ppid).innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>Stop';
  var u=new SpeechSynthesisUtterance(text);u.rate=0.82;u.pitch=1.05;var voice=pickVoice();if(voice)u.voice=voice;
  u.onend=function(){document.getElementById(bid).classList.remove('reading');var b=document.getElementById(ppid);if(b){b.classList.remove('on');b.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play again';}paraOn=null;};
  synth.speak(u);
}
if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=function(){};
window.addEventListener('load',function(){init();synth.getVoices();});
window.addEventListener('beforeunload',function(){synth.cancel();});
</script></body></html>
