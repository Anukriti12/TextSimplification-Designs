<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Activity 6: Your Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B3557;--teal:#2A9D8F;--teal-light:#E8F5F4;--teal-mid:#A8DAD5;--warm:#FAF8F5;--text:#2D3748;--muted:#8896A7;--border:#DDD6CC;--gold:#E9A03B;--gold-bg:#FFF9F0;--violet:#6C63AC;--violet-light:#F0EFF9}
html,body{height:100%;background:#E0DBD3;font-family:'DM Sans',sans-serif;color:var(--text)}

/* Banner */
.banner{background:#0F1923;padding:10px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:2px solid var(--gold)}
.banner-left{display:flex;align-items:center;gap:10px}
.b-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#FCD34D}
.b-title{font-size:13px;font-weight:600;color:#fff}
.b-sep{color:rgba(255,255,255,.2)}
.b-desc{font-size:11px;color:rgba(255,255,255,.4);max-width:380px;text-align:right;line-height:1.4}

/* Choices strip */
.choices-strip{background:#162130;padding:8px 40px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.07)}
.choice-badge{background:rgba(42,157,143,.18);border:1px solid rgba(42,157,143,.35);color:var(--teal-mid);font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;display:flex;align-items:center;gap:5px}
.choice-badge::before{content:'✓';font-size:10px}

/* Page */
.page{max-width:860px;margin:0 auto;background:var(--warm);box-shadow:0 0 60px rgba(0,0,0,.12);display:flex;flex-direction:column;min-height:calc(100vh - 88px)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:52px;background:var(--navy);flex-shrink:0}
.org{font-size:12px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase}
.step-info{font-size:12px;color:var(--teal-mid);font-weight:500}

/* TTS player (shown if choiceTTS != 'd') */
.player-bar{background:var(--navy);padding:11px 40px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.07)}
.play-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;background:var(--teal)}
.play-btn.playing{background:var(--violet)}
.play-btn svg{width:17px;height:17px;fill:#fff}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px}
.prog-fill{height:100%;background:var(--teal);border-radius:2px;width:0%}

/* Doc header */
.doc-header{background:var(--navy);padding:22px 40px 26px;border-top:1px solid rgba(255,255,255,.07)}
.doc-lbl{display:inline-flex;align-items:center;gap:6px;background:rgba(42,157,143,.18);border:1px solid rgba(42,157,143,.4);color:var(--teal-mid);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.doc-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal)}
.doc-header h1{font-family:'Lora',serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
/* Summary variants */
.sum-bullets{list-style:none;margin-top:10px}
.sum-bullets li{display:flex;gap:8px;font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:5px}
.sum-bullets li::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px}
.sum-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sum-chip{background:rgba(42,157,143,.2);color:#9EDBD6;border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;border:1px solid rgba(42,157,143,.3)}

/* Main layout: reading + optional side panel */
.content-area{display:flex;flex:1;overflow:hidden;position:relative}
.reading-pane{flex:1;overflow-y:auto;padding:36px 40px 28px}

/* Text elements */
.s-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.s-head{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--navy);padding-bottom:10px;border-bottom:2px solid var(--teal-light);margin-bottom:4px}
.p{font-family:'Lora',serif;font-size:16.5px;line-height:1.9;color:var(--text);margin-top:14px}
.p-plain{font-family:'DM Sans',sans-serif;font-size:17px;line-height:1.9;color:var(--text);margin-top:14px}
.divider{border:none;border-top:1px dashed var(--border);margin:26px 0}
.chunk{background:#F8F8F6;border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:12px}
.chunk-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.chunk-p{font-family:'Lora',serif;font-size:15.5px;line-height:1.75;color:var(--text)}
.steps-list{list-style:none;padding:0;margin-top:14px}
.step-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #EFEFEA}
.step-row:last-child{border-bottom:none}
.sn{min-width:36px;height:36px;background:var(--navy);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;margin-top:2px}
.st{font-family:'Lora',serif;font-size:16px;line-height:1.8;color:var(--text)}

/* TTS highlight modes */
.word{display:inline;padding:0 1px;border-radius:2px;transition:background .1s}
.sent{display:inline}
.mode-word .word.hl{background:#FEF08A}
.mode-sentence .sent.hl{background:#DCFCE7;border-radius:4px}
.mode-dual .sent.hl{background:#DCFCE7;border-radius:4px}
.mode-dual .sent.hl .word.hl{background:#86EFAC}

/* Definitions */
.def-inline-term{font-style:italic}
.def-inline-plain{font-family:'DM Sans',sans-serif;font-size:14.5px;color:#666;font-style:normal}
.def-inline-plain::before{content:' ('}
.def-inline-plain::after{content:')'}
.def-tap{border-bottom:2px solid var(--teal);cursor:pointer;color:#1B6B66;transition:background .12s;border-radius:2px 2px 0 0}
.def-tap:hover{background:var(--teal-light)}
.def-gloss{border-bottom:1px dotted var(--teal);cursor:pointer;color:#1B6B66}
.def-gloss.active-ref{background:#E8F5F4;border-radius:2px;padding:0 2px}

/* Glossary side panel */
.glossary-panel{width:0;overflow:hidden;transition:width .2s;background:#F8FFFE;border-left:1px solid #C8E8E5;display:flex;flex-direction:column;flex-shrink:0}
.glossary-panel.open{width:240px}
.gloss-head{background:var(--navy);padding:12px 16px;flex-shrink:0}
.gloss-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-mid)}
.gloss-list{flex:1;overflow-y:auto;padding:14px 16px}
.gloss-entry{padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid #D8F0EE}
.gloss-entry:last-child{border-bottom:none}
.gloss-term-h{font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:2px}
.gloss-plain-t{font-size:12px;color:#444;line-height:1.5}

/* Scaffold: explain button */
.para-wrap{position:relative;margin-top:14px}
.explain-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:6px 13px;font-size:12px;font-weight:600;background:transparent;border:1.5px solid rgba(108,99,172,.4);color:var(--violet);border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.explain-btn:hover,.explain-btn.open{background:var(--violet);color:#fff;border-color:var(--violet)}
.intent-chips{display:none;gap:8px;flex-wrap:wrap;margin-top:8px;padding:12px;background:var(--violet-light);border-radius:10px;border:1px solid #D6D0F0}
.intent-chips.show{display:flex}
.intent-chip{background:#fff;border:1.5px solid var(--violet);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--violet);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.intent-chip:hover{background:var(--violet);color:#fff}
.inline-exp{display:none;margin-top:8px;background:#fff;border:1px solid #D6D0F0;border-left:3px solid var(--violet);border-radius:0 10px 10px 0;padding:12px 16px}
.inline-exp.show{display:block}
.exp-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);margin-bottom:5px}
.exp-text{font-size:14px;line-height:1.65;color:#2D3748}
.close-exp{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;padding:0}

/* Scaffold: open helper chat */
.open-chat-btn{background:var(--violet);color:#fff;border:none;border-radius:100px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(108,99,172,.4);margin:20px 0 0}
.side-panel{width:0;overflow:hidden;transition:width .3s;background:#F8F6FF;border-left:1px solid #D6D0F0;display:flex;flex-direction:column;flex-shrink:0}
.side-panel.open{width:280px}
.chat-header{background:var(--navy);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title{display:flex;align-items:center;gap:9px}
.chat-avatar{width:30px;height:30px;background:var(--violet);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.chat-name{color:#fff;font-size:13px;font-weight:600}
.chat-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;line-height:1}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}
.msg{display:flex;gap:7px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.msg-av.bot-av{background:var(--violet);color:#fff}
.msg-av.user-av{background:var(--navy);color:#fff;font-size:10px}
.bubble{border-radius:12px;padding:9px 12px;font-size:13px;line-height:1.5;max-width:87%}
.bubble.bot-b{background:#F0F0EC;border-radius:0 12px 12px 12px;color:#2D3748}
.bubble.user-b{background:var(--violet);color:#fff;border-radius:12px 0 12px 12px}
.typing{display:none;gap:4px;align-items:center;padding:9px 12px;background:#F0F0EC;border-radius:0 12px 12px 12px;max-width:60px}
.typing.show{display:flex}
.dot-t{width:6px;height:6px;border-radius:50%;background:#aaa;animation:blink 1.2s infinite}
.dot-t:nth-child(2){animation-delay:.2s}.dot-t:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-row{padding:11px 13px;border-top:1px solid #D6D0F0;display:flex;gap:7px;flex-shrink:0}
.chat-input{flex:1;border:1.5px solid #D6D0F0;border-radius:100px;padding:8px 13px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.chat-input:focus{border-color:var(--violet)}
.send-btn{background:var(--violet);color:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:15px;height:15px;fill:#fff}

/* Paragraph-play buttons (TTS mode d) */
.para-block{border-radius:8px;padding:12px 16px;margin-bottom:12px;background:transparent;transition:background .2s;border-left:3px solid transparent}
.para-block.reading{background:#F0FFF8;border-left-color:var(--teal)}
.para-play{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1.5px solid rgba(42,157,143,.45);color:var(--teal);border-radius:100px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:all .15s}
.para-play:hover{background:var(--teal-light)}
.para-play.active-para{background:var(--teal);color:#fff;border-color:var(--teal)}

/* Definition popup */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:400;display:none}
.backdrop.show{display:block}
.popup{position:fixed;z-index:401;background:#fff;border-radius:14px;width:300px;max-width:calc(100vw - 32px);box-shadow:0 12px 40px rgba(0,0,0,.18);display:none;overflow:hidden}
.popup.show{display:block}
.popup-head{background:var(--navy);padding:13px 17px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.popup-term-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-mid);margin-bottom:3px}
.popup-term{font-family:'Lora',serif;font-size:17px;font-weight:700;color:#fff}
.popup-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;line-height:1}
.popup-body{padding:14px 17px}
.popup-plain-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.popup-plain{font-size:14px;line-height:1.6;color:#2D3748;margin-bottom:8px}
.popup-example{font-size:12px;color:var(--muted);line-height:1.5;font-style:italic;margin-bottom:11px}
.popup-audio{display:flex;align-items:center;gap:7px;background:var(--teal-light);border:none;border-radius:100px;padding:8px 15px;font-size:12px;font-weight:600;color:var(--teal);cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.popup-audio svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.popup-audio.playing{background:var(--teal);color:#fff}

/* Action bar */
.action-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:var(--warm);border-top:1px solid var(--border);flex-shrink:0}
.btn-read{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;border:none;border-radius:100px;padding:11px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-read svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.btn-done{display:flex;align-items:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:100px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div class="banner">
  <div class="banner-left"><span class="b-tag">Activity 6</span><span class="b-sep">/</span><span class="b-title">Your Tool — All Features Together</span></div>
  <div class="b-desc">This screen combines every feature selected today into one experience.</div>
</div>

<!-- Choices strip: populated by JS -->
<div class="choices-strip" id="choices-strip"></div>

<div class="page">
  <div class="top-bar">
    <span class="org">CHI Fargo Health System</span>
    <span class="step-info" id="step-info">Your personalised reading tool</span>
  </div>

  <!-- TTS player bar (hidden for mode 'd') -->
  <div class="player-bar" id="player-bar" style="display:none">
    <button class="play-btn" id="main-play" onclick="togglePlay()">
      <svg id="play-ico" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </div>

  <!-- Doc header: populated by JS (summary variant injected here) -->
  <div class="doc-header">
    <div class="doc-lbl" id="doc-lbl"></div>
    <h1 id="doc-h1"></h1>
    <div id="doc-summary"></div>
  </div>

  <!-- Main content area -->
  <div class="content-area">
    <div class="reading-pane" id="reading-pane"></div>
    <!-- Glossary panel: shown only for choiceDefs=c -->
    <div class="glossary-panel" id="glossary-panel">
      <div class="gloss-head"><span class="gloss-title">Word List</span></div>
      <div class="gloss-list" id="gloss-list"></div>
    </div>
    <!-- Chat side panel: shown only for choiceScaffold=b -->
    <div class="side-panel" id="side-panel">
      <div class="chat-header">
        <div class="chat-title"><div class="chat-avatar">&#129309;</div><span class="chat-name">Document Helper</span></div>
        <button class="chat-close" onclick="closeChat()">&#x2715;</button>
      </div>
      <div class="chat-msgs" id="chat-msgs">
        <div class="msg bot"><div class="msg-av bot-av">&#129309;</div><div class="bubble bot-b" id="chat-welcome">Hi! What would you like help with?</div></div>
      </div>
      <div class="msg bot" style="padding:0 14px"><div class="typing" id="typing"><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="send-btn" onclick="sendMsg()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-read" id="tts-action-btn" onclick="togglePlay()">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      Read this to me
    </button>
    <button class="btn-done">Done</button>
  </div>
</div>

<!-- Definition popup (tap mode) -->
<div class="backdrop" id="backdrop" onclick="closeDef()"></div>
<div class="popup" id="popup">
  <div class="popup-head"><div><div class="popup-term-lbl">Word Defined</div><div class="popup-term" id="popup-term"></div></div><button class="popup-close" onclick="closeDef()">&#x2715;</button></div>
  <div class="popup-body">
    <div class="popup-plain-lbl">What this means</div>
    <div class="popup-plain" id="popup-plain"></div>
    <div class="popup-example" id="popup-example"></div>
    <button class="popup-audio" id="popup-audio" onclick="toggleAudio()"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg><span id="audio-lbl">Read this definition aloud</span></button>
  </div>
</div>

<script>
// Shared DOCS data — included inline in each activity file
const DOCS = {
  prescription: {
    label: 'Prescription Label',
    original: {
      title: 'METFORMIN HCL 500MG Tablets',
      sub: 'Rx #4821047 · Qty: 60 · Refills: 3 · CHI Fargo Pharmacy',
      kp: ['Take orally twice daily with meals', 'Contraindicated with renal impairment', 'Discontinue if lactic acidosis is suspected'],
      sections: [
        { label: 'Dosage and Administration', head: 'Dosage Instructions',
          body: 'Take 1 tablet orally twice daily with meals. This medication is indicated as an adjunct to diet and exercise to improve glycemic control in adults with type 2 diabetes mellitus. Administer with the evening meal to reduce gastrointestinal adverse effects.' },
        { label: 'Contraindications and Warnings', head: 'Important Warnings',
          body: 'Contraindicated in patients with renal impairment. May cause gastrointestinal adverse effects including nausea, vomiting, and diarrhea, particularly during initiation of therapy. Discontinue immediately if lactic acidosis is suspected: symptoms include unexplained muscle pain, difficulty breathing, and unusual drowsiness.' }
      ]
    },
    plainer: {
      title: 'Metformin 500mg — Your Medicine Label',
      sub: 'Prescription #4821047 · 60 tablets · 3 refills',
      kp: ['Take 1 pill two times a day, with food', 'Do not take if your kidneys are not working well', 'Call your doctor if you feel very sick or have muscle pain'],
      sections: [
        { label: 'How to Take It', head: 'Your Dosage Instructions',
          body: 'Take 1 tablet two times a day. Take it with food, like with dinner. This medicine helps control your blood sugar if you have type 2 diabetes. It works best when you also eat healthy and exercise regularly.' },
        { label: 'Important Warnings', head: 'When to Be Careful',
          body: 'Do not take this medicine if your kidneys are not working well. You may feel sick to your stomach, especially when you first start. This usually gets better after a few weeks. Call your doctor right away if you have muscle pain, feel very tired, or have trouble breathing.' }
      ]
    },
    plainest: {
      title: 'Your Medicine: Metformin',
      sub: 'This tells you how to take your pill.',
      kp: ['Take 1 pill, 2 times a day, with food', 'Call your doctor if you feel very sick'],
      steps: ['Take 1 pill.', 'Take it 2 times a day.', 'Always take it with food.', 'This pill helps your blood sugar.'],
      sections: [{ label: 'Important', head: 'When to Call Your Doctor', body: 'Call your doctor if your stomach hurts or if you feel very tired.' }]
    },

// TTS state

var CHOICE_LABELS = {
  original:'As Printed', plainer:'Plain Language', plainest:'Easy Read',
  sa:'Key Points summary', sb:'Page Topics summary', sc:'No summary',
  c1:'One block layout', c2:'Labeled sections', c3:'Numbered steps',
  a:'Word highlight', b:'Sentence highlight', c:'Dual highlight', d:'Section play',
  // defs
  inline:'Inline definitions', tap:'Tap to define', glossary:'Side glossary',
  // scaffold
  button:'Help button', chat:'Chat helper'
};
var DEFS_LBL = {a:'Inline definitions', b:'Tap to define', c:'Side glossary'};
var SCAFFOLD_LBL = {a:'Help button', b:'Chat helper'};
var TTS_LBL = {a:'Word highlight',b:'Sentence highlight',c:'Word and sentence',d:'Section by section'};
var SUMMARY_LBL = {sa:'Key Points summary',sb:'Page Topics summary',sc:'No summary at top'};
var LAYOUT_LBL = {c1:'One block text',c2:'Labeled sections',c3:'Numbered steps'};

function buildChoicesStrip() {
  var strip = document.getElementById('choices-strip');
  var choices = [
    d.label + ' (' + (selectedLevel==='original'?'As Printed':selectedLevel==='plainer'?'Plain Language':'Easy Read') + ')',
    SUMMARY_LBL[choiceSummary] || choiceSummary,
    LAYOUT_LBL[choiceLayout] || choiceLayout,
    TTS_LBL[choiceTTS] || choiceTTS,
    DEFS_LBL[choiceDefs] || choiceDefs,
    SCAFFOLD_LBL[choiceScaffold] || choiceScaffold
  ];
  strip.innerHTML = choices.map(function(c) {
    return '<span class="choice-badge">' + c + '</span>';
  }).join('');
}

// ── SENTENCE/WORD SPAN BUILDER ───────────────────────────────────────────────
function toSents(t) { return t.match(/[^.!?]+[.!?]+/g) || [t]; }
function buildSpans(text, pfx) {
  return toSents(text).map(function(s, si) {
    var words = s.trim().split(/\s+/).map(function(w, wi) {
      return '<span class="word" data-k="' + pfx + '-' + si + '-' + wi + '">' + w + '</span>';
    }).join(' ');
    return '<span class="sent" data-s="' + pfx + '-' + si + '">' + words + ' </span>';
  }).join('');
}

// ── INJECT DEFINITIONS ───────────────────────────────────────────────────────
function injectDefs(bodyText, mode) {
  Object.keys(defs).forEach(function(termKey) {
    var def = defs[termKey]; if (!def) return;
    var escaped = termKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('(' + escaped + ')', 'gi');
    if (mode === 'a') {
      // Inline: term + plain meaning in parens
      bodyText = bodyText.replace(re, function(match) {
        return '<span class="def-inline-term">' + match + '</span><span class="def-inline-plain">' + def.plain + '</span>';
      });
    } else if (mode === 'b') {
      // Tap: underlined
      bodyText = bodyText.replace(re, function(match) {
        return '<span class="def-tap" data-defkey="' + termKey + '">' + match + '</span>';
      });
    } else if (mode === 'c') {
      // Glossary: highlighted
      bodyText = bodyText.replace(re, function(match) {
        return '<span class="def-gloss" data-gkey="' + termKey + '">' + match + '</span>';
      });
    }
  });
  return bodyText;
}

// ── BUILD DOC HEADER (summary) ───────────────────────────────────────────────
function buildHeader() {
  document.getElementById('doc-lbl').textContent = d.label;
  document.getElementById('doc-h1').textContent = v.title;
  var sumDiv = document.getElementById('doc-summary');
  sumDiv.innerHTML = '';
  if (choiceSummary === 'sa') {
    var ul = document.createElement('ul'); ul.className = 'sum-bullets';
    v.kp.slice(0, 3).forEach(function(k) { var li=document.createElement('li'); li.textContent=k; ul.appendChild(li); });
    sumDiv.appendChild(ul);
  } else if (choiceSummary === 'sb') {
    var p = document.createElement('p'); p.style.cssText='font-size:13px;color:rgba(255,255,255,.5);margin-top:8px'; p.textContent='This page covers:'; sumDiv.appendChild(p);
    var chips = document.createElement('div'); chips.className='sum-chips';
    (v.sections||[]).forEach(function(sec) { var sp=document.createElement('span'); sp.className='sum-chip'; sp.textContent=sec.head; chips.appendChild(sp); });
    sumDiv.appendChild(chips);
  }
  // choiceSummary==='sc': no summary, leave empty
}

// ── BUILD READING PANE ───────────────────────────────────────────────────────
function buildReadingPane() {
  var pane = document.getElementById('reading-pane');
  pane.innerHTML = '';
  var secs = v.sections || [];
  // Build fullText for TTS
  fullText = secs.map(function(s) { return s.body; }).join(' ');
  docContext = v.title + '\n\n' + secs.map(function(s) { return s.head + ': ' + s.body; }).join('\n\n');

  // For TTS modes a/b/c — always build spans; for mode d — build para-blocks
  var ttsMode = choiceTTS; // 'a','b','c','d'
  var modeClass = {a:'mode-word', b:'mode-sentence', c:'mode-dual'};

  secs.forEach(function(sec, i) {
    if (i > 0) { var hr=document.createElement('hr'); hr.className='divider'; pane.appendChild(hr); }

    var secDiv = document.createElement('div');
    var lbl='<div class="s-lbl">'+sec.label+'</div><div class="s-head">'+sec.head+'</div>';

    if (choiceLayout === 'c1') {
      // One block
      secDiv.innerHTML = lbl;
      var bodyHtml = injectDefs(sec.body, choiceDefs);
      if (ttsMode === 'd') {
        var block = buildParaBlock(bodyHtml, sec.body, i);
        secDiv.appendChild(block);
      } else {
        var rt = document.createElement('div');
        rt.className = 'p read-text ' + (modeClass[ttsMode]||'mode-word');
        rt.innerHTML = buildSpans(sec.body, 'p'+i);
        // Re-inject defs over spans — simpler: just use plain p with defs for combined view
        var plainP = document.createElement('p');
        plainP.className = 'p ' + (modeClass[ttsMode]||'mode-word');
        plainP.innerHTML = injectDefs(buildSpans(sec.body, 'p'+i), choiceDefs);
        secDiv.innerHTML = lbl;
        secDiv.appendChild(plainP);
      }
    } else if (choiceLayout === 'c2') {
      // Labeled chunks
      secDiv.innerHTML = lbl;
      var chunk = document.createElement('div'); chunk.className='chunk';
      var clbl = document.createElement('div'); clbl.className='chunk-lbl'; clbl.textContent=sec.label; chunk.appendChild(clbl);
      if (ttsMode === 'd') {
        var cp = document.createElement('p'); cp.className='chunk-p'; cp.innerHTML=injectDefs(sec.body,choiceDefs); chunk.appendChild(cp);
        var pb = buildParaBlock(injectDefs(sec.body,choiceDefs), sec.body, i);
        // Replace content with para block style inside chunk
        chunk.innerHTML='<div class="chunk-lbl">'+sec.label+'</div>';
        chunk.appendChild(pb);
      } else {
        var cp2 = document.createElement('p'); cp2.className='chunk-p ' + (modeClass[ttsMode]||'mode-word');
        cp2.innerHTML = injectDefs(buildSpans(sec.body,'ch'+i), choiceDefs);
        chunk.appendChild(cp2);
      }
      secDiv.appendChild(chunk);
    } else {
      // Numbered steps: split into sentences
      secDiv.innerHTML = lbl;
      var ul = document.createElement('ul'); ul.className='steps-list';
      var idx = i * 10 + 1;
      sec.body.split(/(?<=[.!?])\s+/).filter(function(t){return t.trim().length>3;}).forEach(function(sent) {
        var li=document.createElement('li'); li.className='step-row';
        li.innerHTML='<div class="sn">'+idx+'</div><div class="st">'+injectDefs(sent.trim(),choiceDefs)+'</div>';
        ul.appendChild(li); idx++;
      });
      secDiv.appendChild(ul);
    }

    // Add scaffolding if choiceScaffold === 'a' (explain button)
    if (choiceScaffold === 'a') {
      var pw = document.createElement('div'); pw.className='para-wrap';
      var pid = 'p'+i;
      var eb = document.createElement('button'); eb.className='explain-btn'; eb.textContent='Explain this differently';
      eb.onclick = (function(p, btn) { return function(){ openIntent(p, btn); }; })(pid, eb);
      pw.appendChild(eb);
      var chips = document.createElement('div'); chips.className='intent-chips'; chips.id='chips-'+pid;
      chips.innerHTML = '<button class="intent-chip" onclick="showExp(\''+pid+'\',\'what\')">What do I do?</button>' +
        '<button class="intent-chip" onclick="showExp(\''+pid+'\',\'mean\')">What does this mean?</button>' +
        '<button class="intent-chip" onclick="showExp(\''+pid+'\',\'why\')">Why do I need to do this?</button>';
      pw.appendChild(chips);
      var exp = document.createElement('div'); exp.className='inline-exp'; exp.id='exp-'+pid;
      exp.innerHTML='<div class="exp-lbl" id="exp-'+pid+'-lbl"></div><div class="exp-text" id="exp-'+pid+'-txt"></div><button class="close-exp" onclick="closeExp(\''+pid+'\')">Close</button>';
      pw.appendChild(exp);
      secDiv.appendChild(pw);
    }

    pane.appendChild(secDiv);
  });

  // Open helper button if choiceScaffold === 'b'
  if (choiceScaffold === 'b') {
    var ocb = document.createElement('button'); ocb.className='open-chat-btn'; ocb.id='open-chat-btn';
    ocb.innerHTML='&#128172; Open helper'; ocb.onclick=openChat;
    pane.appendChild(ocb);
  }

  // Event delegation for tap-to-define
  if (choiceDefs === 'b') {
    pane.addEventListener('click', function(e) {
      var span = e.target.closest('[data-defkey]');
      if (span) showDef(e, span.dataset.defkey);
    });
  }
  // Event delegation for glossary
  if (choiceDefs === 'c') {
    pane.addEventListener('click', function(e) {
      var span = e.target.closest('[data-gkey]');
      if (span) highlightGlossEntry(span.dataset.gkey);
    });
  }

  // TTS — collect all word spans
  allWords = [];
  document.querySelectorAll('.word').forEach(function(w) { allWords.push(w); });
}

function buildParaBlock(bodyHtml, rawText, idx) {
  var block = document.createElement('div'); block.className='para-block'; block.id='pb'+idx;
  var pt = document.createElement('p'); pt.className='p'; pt.innerHTML=bodyHtml; block.appendChild(pt);
  var pb = document.createElement('button'); pb.className='para-play'; pb.id='pp'+idx; pb.textContent='▶ Play this section';
  pb.onclick = (function(bid,ppid,txt){return function(){playPara(bid,ppid,txt);};}('pb'+idx,'pp'+idx,rawText));
  block.appendChild(pb);
  return block;
}

// ── BUILD GLOSSARY PANEL ─────────────────────────────────────────────────────
function buildGlossary() {
  var gList = document.getElementById('gloss-list'); gList.innerHTML='';
  Object.keys(defs).forEach(function(k) {
    var def=defs[k]; if(!def) return;
    var entry=document.createElement('div'); entry.className='gloss-entry'; entry.id='ge-'+k.replace(/\s+/g,'-');
    entry.innerHTML='<div class="gloss-term-h">'+def.term+'</div><div class="gloss-plain-t">'+def.plain+'</div>';
    gList.appendChild(entry);
  });
}

function highlightGlossEntry(k) {
  document.querySelectorAll('.def-gloss.active-ref').forEach(function(el){el.classList.remove('active-ref');});
  document.querySelectorAll('[data-gkey="'+k+'"]').forEach(function(el){el.classList.add('active-ref');});
  var entry=document.getElementById('ge-'+k.replace(/\s+/g,'-'));
  if(entry){entry.style.background='#E0F5F3';entry.scrollIntoView({behavior:'smooth',block:'nearest'});setTimeout(function(){if(entry)entry.style.background='';},2000);}
}

// ── DEFINITION POPUP ─────────────────────────────────────────────────────────
function showDef(e, key) {
  var def=defs[key]; if(!def) return;
  e.stopPropagation();
  document.getElementById('popup-term').textContent=def.term;
  document.getElementById('popup-plain').textContent=def.plain;
  document.getElementById('popup-example').textContent=def.example||'';
  var pop=document.getElementById('popup');
  pop.classList.add('show'); document.getElementById('backdrop').classList.add('show');
  var r=e.target.getBoundingClientRect();
  var pw=300,ph=260;
  var left=r.left+window.scrollX, top=r.bottom+window.scrollY+8;
  if(left+pw>window.innerWidth-16) left=window.innerWidth-pw-16;
  if(top+ph>window.scrollY+window.innerHeight-16) top=r.top+window.scrollY-ph-8;
  pop.style.left=Math.max(8,left)+'px'; pop.style.top=Math.max(8,top)+'px';
  resetAudio();
}
function closeDef(){document.getElementById('popup').classList.remove('show');document.getElementById('backdrop').classList.remove('show');resetAudio();}
function toggleAudio(){
  var btn=document.getElementById('popup-audio'),lbl=document.getElementById('audio-lbl');
  if(audioPlaying){resetAudio();return;}
  audioPlaying=true;btn.classList.add('playing');lbl.textContent='Playing... tap to stop';
  var u=new SpeechSynthesisUtterance(document.getElementById('popup-plain').textContent); u.rate=0.88;
  u.onend=function(){resetAudio();}; synth.cancel(); synth.speak(u);
  audioTimer=setTimeout(resetAudio,10000);
}
function resetAudio(){audioPlaying=false;clearTimeout(audioTimer);synth.cancel();var btn=document.getElementById('popup-audio'),lbl=document.getElementById('audio-lbl');if(btn){btn.classList.remove('playing');lbl.textContent='Read this definition aloud';}}

// ── SCAFFOLDING: HELP BUTTON ─────────────────────────────────────────────────
function openIntent(pid, btn) {
  var chips=document.getElementById('chips-'+pid);
  var isOpen=chips.classList.contains('show');
  document.querySelectorAll('.intent-chips').forEach(function(c){c.classList.remove('show');});
  document.querySelectorAll('.explain-btn').forEach(function(b){b.classList.remove('open');});
  document.querySelectorAll('.inline-exp').forEach(function(e){e.classList.remove('show');});
  if(!isOpen){chips.classList.add('show');btn.classList.add('open');}
}
function showExp(pid,intent){
  var data=expls[pid]&&expls[pid][intent];
  var lblMap={what:'What do I do?',mean:'What does this mean?',why:'Why do I need to do this?'};
  var lbl=document.getElementById('exp-'+pid+'-lbl');
  var txt=document.getElementById('exp-'+pid+'-txt');
  if(lbl) lbl.textContent=lblMap[intent];
  if(txt) txt.textContent=data||'Help for this section is coming soon.';
  document.getElementById('chips-'+pid).classList.remove('show');
  document.getElementById('exp-'+pid).classList.add('show');
  document.querySelectorAll('.explain-btn').forEach(function(b){b.classList.remove('open');});
}
function closeExp(pid){document.getElementById('exp-'+pid).classList.remove('show');}

// ── SCAFFOLDING: CHAT HELPER ─────────────────────────────────────────────────
function openChat(){
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('open-chat-btn').style.display='none';
}
function closeChat(){
  document.getElementById('side-panel').classList.remove('open');
  var ocb=document.getElementById('open-chat-btn'); if(ocb) ocb.style.display='';
}

async function askClaude(q) {
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:800,
        system:'You are a plain-language health document helper for adults with intellectual and developmental disabilities. The user is reading:\n\n'+docContext+'\n\nAnswer in simple short sentences. No jargon without explanation. 3 to 4 sentences maximum. Be warm and direct.',
        messages:[{role:'user',content:q}]
      })
    });
    var data=await res.json();
    return (data.content&&data.content[0]&&data.content[0].text)||'I am having trouble right now. Try asking again.';
  } catch(e){ return 'I am having trouble connecting. Try again in a moment.'; }
}

async function sendMsg(){
  var inp=document.getElementById('chat-input');
  var t=inp.value.trim(); if(!t) return;
  inp.value='';
  var msgs=document.getElementById('chat-msgs');
  // Add user bubble
  var ud=document.createElement('div'); ud.className='msg user';
  ud.innerHTML='<div class="msg-av user-av">You</div><div class="bubble user-b">'+t+'</div>';
  msgs.appendChild(ud); msgs.scrollTop=msgs.scrollHeight;
  // Show typing
  document.getElementById('typing').classList.add('show');
  var reply=await askClaude(t);
  document.getElementById('typing').classList.remove('show');
  var bd=document.createElement('div'); bd.className='msg bot';
  bd.innerHTML='<div class="msg-av bot-av">&#129309;</div><div class="bubble bot-b">'+reply+'</div>';
  msgs.appendChild(bd); msgs.scrollTop=msgs.scrollHeight;
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function togglePlay(){
  if(choiceTTS==='d') return;
  if(isPlaying){stopTTS();return;}
  startTTS();
}
function startTTS(){
  stopTTS(); isPlaying=true; setPlayState(true);
  document.getElementById('step-info').textContent='Reading aloud...';
  allWords=[]; document.querySelectorAll('.word').forEach(function(w){allWords.push(w);}); wordIdx=0;
  var u=new SpeechSynthesisUtterance(fullText); u.rate=0.88; u.pitch=1;
  u.onboundary=function(e){
    if(e.name!=='word') return;
    var cc=0,found=0;
    fullText.split(/\s+/).forEach(function(w,i){if(cc<=e.charIndex)found=i;cc+=w.length+1;});
    if(found<allWords.length){wordIdx=found;hlWord(found);document.getElementById('prog-fill').style.width=((found/allWords.length)*100)+'%';}
  };
  u.onend=function(){stopTTS();document.getElementById('step-info').textContent='Done. Press play to hear again.';};
  u.onerror=function(){simFallback();};
  synth.speak(u);
  setTimeout(function(){if(isPlaying&&wordIdx===0&&allWords.length>0)simFallback();},700);
}
function simFallback(){
  if(simInterval)clearInterval(simInterval);
  var total=allWords.length;
  var ms=Math.max(80,(fullText.split(/\s+/).length/0.88)*350/total);
  simInterval=setInterval(function(){
    if(!isPlaying){clearInterval(simInterval);return;}
    if(wordIdx>=total){stopTTS();return;}
    hlWord(wordIdx); document.getElementById('prog-fill').style.width=((wordIdx/total)*100)+'%'; wordIdx++;
  },ms);
}
function hlWord(idx){
  document.querySelectorAll('.word.hl').forEach(function(w){w.classList.remove('hl');});
  document.querySelectorAll('.sent.hl').forEach(function(s){s.classList.remove('hl');});
  if(idx>=allWords.length) return;
  allWords[idx].classList.add('hl');
  var sent=allWords[idx].closest('.sent'); if(sent) sent.classList.add('hl');
}
function stopTTS(){
  isPlaying=false; synth.cancel(); clearInterval(simInterval);
  document.querySelectorAll('.word.hl,.sent.hl').forEach(function(el){el.classList.remove('hl');});
  setPlayState(false); document.getElementById('prog-fill').style.width='0%';
  if(document.getElementById('step-info').textContent==='Reading aloud...')
    document.getElementById('step-info').textContent='Your personalised reading tool';
}
function setPlayState(on){
  var btn=document.getElementById('main-play'); if(!btn) return;
  btn.classList.toggle('playing',on);
  document.getElementById('play-ico').innerHTML=on
    ?'<rect x="6" y="4" width="4" height="16" rx="1" fill="#fff"/><rect x="14" y="4" width="4" height="16" rx="1" fill="#fff"/>'
    :'<path d="M8 5v14l11-7z" fill="#fff"/>';
}
function playPara(bid,ppid,text){
  if(paraPlaying===ppid){synth.cancel();document.getElementById(bid).classList.remove('reading');document.getElementById(ppid).classList.remove('active-para');document.getElementById(ppid).textContent='▶ Play this section';paraPlaying=null;return;}
  if(paraPlaying){var pb=document.querySelector('.para-block.reading');var pp=document.querySelector('.para-play.active-para');if(pb)pb.classList.remove('reading');if(pp){pp.classList.remove('active-para');pp.textContent='▶ Play this section';}synth.cancel();}
  paraPlaying=ppid;
  document.getElementById(bid).classList.add('reading');document.getElementById(ppid).classList.add('active-para');document.getElementById(ppid).textContent='⏸ Stop';
  var u=new SpeechSynthesisUtterance(text); u.rate=0.88;
  u.onend=function(){document.getElementById(bid).classList.remove('reading');var b=document.getElementById(ppid);if(b){b.classList.remove('active-para');b.textContent='▶ Play again';}paraPlaying=null;};
  synth.speak(u);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  buildChoicesStrip();
  buildHeader();
  buildReadingPane();
  // Show/hide panels
  if(choiceDefs==='c') document.getElementById('glossary-panel').classList.add('open');
  if(choiceDefs==='c') buildGlossary();
  // Show TTS player bar
  if(choiceTTS!=='d') document.getElementById('player-bar').style.display='flex';
  // Set welcome message
  if(d.chatWelcome) document.getElementById('chat-welcome').textContent=d.chatWelcome;
});
window.addEventListener('beforeunload',function(){synth.cancel();});
</script>
