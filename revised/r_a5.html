<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Activity 5: Adaptive Scaffolding</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B3557;--teal:#2A9D8F;--teal-light:#E8F5F4;--teal-mid:#A8DAD5;--warm:#FAF8F5;--text:#2D3748;--muted:#8896A7;--border:#DDD6CC;--violet:#6C63AC;--violet-light:#F0EFF9}
html,body{height:100%;background:#E0DBD3;font-family:'DM Sans',sans-serif;color:var(--text)}
.banner{background:#0F1923;padding:10px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:2px solid var(--violet)}
.banner-left{display:flex;align-items:center;gap:10px}
.b-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#A9A3D9}
.b-title{font-size:13px;font-weight:600;color:#fff}
.b-sep{color:rgba(255,255,255,.2)}
.b-desc{font-size:11px;color:rgba(255,255,255,.4);max-width:380px;text-align:right;line-height:1.4}
.tabs{background:#162130;display:flex;padding:0 40px;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:45px;z-index:299}
.tab{padding:13px 26px 11px;font-size:13px;font-weight:600;color:rgba(255,255,255,.35);cursor:pointer;border-bottom:3px solid transparent;user-select:none;transition:color .15s}
.tab:hover{color:rgba(255,255,255,.65)}
.tab.active{color:#fff;border-bottom-color:var(--violet)}
.page{max-width:860px;margin:0 auto;background:var(--warm);box-shadow:0 0 60px rgba(0,0,0,.12);display:flex;flex-direction:column;min-height:calc(100vh - 96px)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:52px;background:var(--navy);flex-shrink:0}
.org{font-size:12px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase}
.step-info{font-size:12px;color:var(--teal-mid);font-weight:500}
.doc-header{background:var(--navy);padding:22px 40px 26px;border-top:1px solid rgba(255,255,255,.07)}
.doc-lbl{display:inline-flex;align-items:center;gap:6px;background:rgba(42,157,143,.18);border:1px solid rgba(42,157,143,.4);color:var(--teal-mid);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.doc-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal)}
.doc-header h1{font-family:'Lora',serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.sum-text{font-size:13.5px;color:rgba(255,255,255,.58);line-height:1.65;max-width:680px}
.sum-text strong{color:rgba(255,255,255,.85)}
.content-area{display:flex;flex:1;overflow:hidden;position:relative}
.reading-pane{flex:1;overflow-y:auto;padding:36px 40px 28px}
.pane-wrap{display:none}
.pane-wrap.active{display:flex;flex-direction:column;flex:1}
.side-panel{width:0;overflow:hidden;transition:width .3s;background:#F8F6FF;border-left:1px solid #D6D0F0;display:flex;flex-direction:column;flex-shrink:0}
.side-panel.open{width:300px}
.s-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.s-head{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--navy);padding-bottom:10px;border-bottom:2px solid var(--teal-light);margin-bottom:4px}
.p{font-family:'Lora',serif;font-size:16.5px;line-height:1.85;color:var(--text);margin-top:14px}
.divider{border:none;border-top:1px dashed var(--border);margin:26px 0}
.sec-block{margin-bottom:24px}
/* Mode A: inline explain button */
.para-wrap{margin-top:14px}
.explain-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;font-size:12px;font-weight:600;background:transparent;border:1.5px solid rgba(108,99,172,.4);color:var(--violet);border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.explain-btn:hover,.explain-btn.open{background:var(--violet);color:#fff;border-color:var(--violet)}
.intent-chips{display:none;gap:8px;flex-wrap:wrap;margin-top:10px;padding:14px;background:var(--violet-light);border-radius:10px;border:1px solid #D6D0F0}
.intent-chips.show{display:flex}
.intent-chip{background:#fff;border:1.5px solid var(--violet);border-radius:100px;padding:7px 16px;font-size:12.5px;font-weight:600;color:var(--violet);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.intent-chip:hover{background:var(--violet);color:#fff}
.inline-exp{display:none;margin-top:10px;background:#fff;border:1px solid #D6D0F0;border-left:3px solid var(--violet);border-radius:0 10px 10px 0;padding:14px 16px}
.inline-exp.show{display:block}
.exp-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);margin-bottom:6px}
.exp-text{font-size:14px;line-height:1.65;color:#2D3748}
.close-exp{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;padding:0}
/* Chat panel */
.chat-header{background:var(--navy);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title{display:flex;align-items:center;gap:10px}
.chat-avatar{width:32px;height:32px;background:var(--violet);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-name{color:#fff;font-size:14px;font-weight:600}
.chat-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;line-height:1}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.msg-av.bot-av{background:var(--violet);color:#fff}
.msg-av.user-av{background:var(--navy);color:#fff;font-size:10px}
.bubble{border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.55;max-width:85%}
.bubble.bot-b{background:#F0F0EC;border-radius:0 12px 12px 12px;color:#2D3748}
.bubble.user-b{background:var(--violet);color:#fff;border-radius:12px 0 12px 12px}
.typing{display:none;gap:4px;align-items:center;padding:10px 13px;background:#F0F0EC;border-radius:0 12px 12px 12px;max-width:60px}
.typing.show{display:flex}
.dot-t{width:7px;height:7px;border-radius:50%;background:#aaa;animation:blink 1.2s infinite}
.dot-t:nth-child(2){animation-delay:.2s}
.dot-t:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.qr-wrap{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.qr-btn{background:#fff;border:1.5px solid var(--violet);border-radius:20px;padding:7px 14px;font-size:12.5px;color:var(--navy);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .12s}
.qr-btn:hover{background:var(--violet-light)}
.chat-input-row{padding:12px 14px;border-top:1px solid #D6D0F0;display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;border:1.5px solid #D6D0F0;border-radius:100px;padding:9px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.chat-input:focus{border-color:var(--violet)}
.send-btn{background:var(--violet);color:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:16px;height:16px;fill:#fff}
/* Open chat floating button */
.open-chat-btn{position:absolute;bottom:16px;right:20px;background:var(--violet);color:#fff;border:none;border-radius:100px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(108,99,172,.4);z-index:5}
/* Action bar */
.action-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:var(--warm);border-top:1px solid var(--border);flex-shrink:0}
.btn-read{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;border:none;border-radius:100px;padding:11px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-read svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.btn-back{display:flex;align-items:center;gap:8px;background:transparent;color:var(--navy);border:1.5px solid var(--border);border-radius:100px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-back svg,.btn-next svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-back:disabled{opacity:.3;cursor:default}
.btn-next{display:flex;align-items:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:100px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-next svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="banner">
  <div class="banner-left"><span class="b-tag">Activity 5</span><span class="b-sep">/</span><span class="b-title">Adaptive Scaffolding</span></div>
  <div class="b-desc">Two ways to get help when something is confusing. A button you control or a chat helper.</div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-a" onclick="sw('a')">Help Button</div>
  <div class="tab" id="tab-b" onclick="sw('b')">Open Helper</div>
</div>
<div class="page">
  <div class="top-bar">
    <span class="org">CHI Fargo Health System</span>
    <span class="step-info" id="step-info">Tap "Explain this differently" on any section</span>
  </div>
  <div class="doc-header">
    <div class="doc-lbl" id="doc-lbl-el"></div>
    <h1 id="doc-h1"></h1>
    <p class="sum-text" id="doc-sum"></p>
  </div>

  <!-- MODE A: Help Button -->
  <div id="wrap-a" class="pane-wrap active">
    <div class="content-area">
      <div class="reading-pane" id="reading-a"></div>
    </div>
  </div>

  <!-- MODE B: Chat Helper -->
  <div id="wrap-b" class="pane-wrap">
    <div class="content-area">
      <div class="reading-pane" id="reading-b"></div>
      <button class="open-chat-btn" id="ocb-b" onclick="openChat('b')">&#128172; Open helper</button>
      <div class="side-panel" id="sp-b">
        <div class="chat-header">
          <div class="chat-title"><div class="chat-avatar">&#129309;</div><span class="chat-name">Document Helper</span></div>
          <button class="chat-close" onclick="closeChat('b')">&#x2715;</button>
        </div>
        <div class="chat-msgs" id="msgs-b">
          <div class="msg bot"><div class="msg-av bot-av">&#129309;</div><div class="bubble bot-b" id="welcome-b">Hi! What would you like help with?</div></div>
          <div class="qr-wrap" id="qr-b"></div>
        </div>
        <div class="msg bot" style="padding:0 16px"><div class="typing" id="typing-b"><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div></div>
        <div class="chat-input-row">
          <input class="chat-input" id="input-b" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendMsg('b')"/>
          <button class="send-btn" onclick="sendMsg('b')"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-read" onclick="readPage()"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>Read this to me</button>
    <button class="btn-back" id="btn-back" onclick="stepTab(-1)" disabled><svg viewBox="0 0 24 24"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>Back</button>
    <button class="btn-next" id="btn-next" onclick="stepTab(1)">Next<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
  </div>
</div>

function init() {
  const key = localStorage.getItem('selectedDoc') || 'consent';
  const level = localStorage.getItem('selectedLevel') || 'plainer';
  const d = DOCS[key];
  const v = d[level] || d.plainer || d.original;
  expls = d.expls || {};
  document.getElementById('doc-lbl-el').textContent = d.label;
  document.getElementById('doc-h1').textContent = v.title;
  const s0 = v.sections && v.sections[0];
  const s1 = v.sections && v.sections[1];
  if (s0) {
    document.getElementById('doc-sum').innerHTML = 'This document covers: <strong>' + s0.head + '</strong>' + (s1 ? ' and <strong>' + s1.head + '</strong>' : '') + '.';
  }
  if (d.chatWelcome) {
    document.getElementById('welcome-b').textContent = d.chatWelcome;
  }
  // Build reading panes for A and B
  ['a','b'].forEach(function(m) {
    buildReading(m, v);
  });
}

function buildReading(m, v) {
  var area = document.getElementById('reading-' + m);
  if (!area) return;
  area.innerHTML = '';
  var secs = v.sections || [];
  secs.forEach(function(sec, i) {
    if (i > 0) {
      var hr = document.createElement('hr');
      hr.className = 'divider';
      area.appendChild(hr);
    }
    var block = document.createElement('div');
    block.className = 'sec-block';
    if (m === 'a') {
      var pid = 'p' + i;
      block.innerHTML = '<div class="s-lbl">' + sec.label + '</div><div class="s-head">' + sec.head + '</div>';
      var wrap = document.createElement('div');
      wrap.className = 'para-wrap';
      wrap.innerHTML = '<p class="p" style="margin:0">' + sec.body + '</p>';
      var ebtn = document.createElement('button');
      ebtn.className = 'explain-btn';
      ebtn.textContent = 'Explain this differently';
      ebtn.onclick = (function(p) { return function() { openIntent(p, ebtn); }; })(pid);
      wrap.appendChild(ebtn);
      var chips = document.createElement('div');
      chips.className = 'intent-chips';
      chips.id = 'chips-' + pid;
      chips.innerHTML =
        '<button class="intent-chip" onclick="showExp(\'' + pid + '\',\'what\')">What do I do?</button>' +
        '<button class="intent-chip" onclick="showExp(\'' + pid + '\',\'mean\')">What does this mean?</button>' +
        '<button class="intent-chip" onclick="showExp(\'' + pid + '\',\'why\')">Why do I need to do this?</button>';
      wrap.appendChild(chips);
      var exp = document.createElement('div');
      exp.className = 'inline-exp';
      exp.id = 'exp-' + pid;
      exp.innerHTML = '<div class="exp-lbl" id="exp-' + pid + '-lbl"></div><div class="exp-text" id="exp-' + pid + '-txt"></div><button class="close-exp" onclick="closeExp(\'' + pid + '\')">Close</button>';
      wrap.appendChild(exp);
      block.appendChild(wrap);
    } else {
      block.innerHTML = '<div class="s-lbl">' + sec.label + '</div><div class="s-head">' + sec.head + '</div><p class="p">' + sec.body + '</p>';
    }
    area.appendChild(block);
  });
}

function sw(m) {
  currentMode = m;
  TABS.forEach(function(x) {
    document.getElementById('tab-' + x).classList.toggle('active', x === m);
    document.getElementById('wrap-' + x).classList.toggle('active', x === m);
  });
  var idx = TABS.indexOf(m);
  document.getElementById('btn-back').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === TABS.length - 1 ? 'Done' : 'Next ›';
  var lbl = {a: 'Tap "Explain this differently" on any section', b: 'Open the helper to ask questions'};
  document.getElementById('step-info').textContent = lbl[m];
  window.speechSynthesis.cancel();
}

function stepTab(dir) {
  var idx = TABS.indexOf(currentMode);
  var n = idx + dir;
  if (n >= 0 && n < TABS.length) sw(TABS[n]);
}

function openIntent(pid, btn) {
  var chips = document.getElementById('chips-' + pid);
  var isOpen = chips.classList.contains('show');
  document.querySelectorAll('.intent-chips').forEach(function(c) { c.classList.remove('show'); });
  document.querySelectorAll('.explain-btn').forEach(function(b) { b.classList.remove('open'); });
  document.querySelectorAll('.inline-exp').forEach(function(e) { e.classList.remove('show'); });
  if (!isOpen) { chips.classList.add('show'); btn.classList.add('open'); }
}

function showExp(pid, intent) {
  var data = expls[pid] && expls[pid][intent];
  var lblMap = {what: 'What do I do?', mean: 'What does this mean?', why: 'Why do I need to do this?'};
  var lbl = document.getElementById('exp-' + pid + '-lbl');
  var txt = document.getElementById('exp-' + pid + '-txt');
  if (lbl) lbl.textContent = lblMap[intent];
  if (txt) txt.textContent = data || 'Help for this section is coming soon.';
  document.getElementById('chips-' + pid).classList.remove('show');
  document.getElementById('exp-' + pid).classList.add('show');
  document.querySelectorAll('.explain-btn').forEach(function(b) { b.classList.remove('open'); });
}

function closeExp(pid) {
  document.getElementById('exp-' + pid).classList.remove('show');
}

function openChat(v) {
  var sp = document.getElementById('sp-' + v);
  if (sp) sp.classList.add('open');
  var ob = document.getElementById('ocb-' + v);
  if (ob) ob.style.display = 'none';
}

function closeChat(v) {
  var sp = document.getElementById('sp-' + v);
  if (sp) sp.classList.remove('open');
  var ob = document.getElementById('ocb-' + v);
  if (ob) ob.style.display = '';
}

function qr(v, text, intent) {
  addUser(v, text);
  document.getElementById('qr-' + v).style.display = 'none';
  showTyping(v, function() { addBot(v, chatResp[intent] || chatResp.other); });
}

function sendMsg(v) {
  var inp = document.getElementById('input-' + v);
  var t = inp.value.trim();
  if (!t) return;
  addUser(v, t);
  inp.value = '';
  document.getElementById('qr-' + v).style.display = 'none';
  showTyping(v, function() { addBot(v, chatResp.other); });
}

function addUser(v, t) {
  var m = document.getElementById('msgs-' + v);
  var d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = '<div class="msg-av user-av">You</div><div class="bubble user-b">' + t + '</div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function addBot(v, t) {
  var m = document.getElementById('msgs-' + v);
  document.getElementById('typing-' + v).classList.remove('show');
  var d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = '<div class="msg-av bot-av">&#129309;</div><div class="bubble bot-b">' + t + '</div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function showTyping(v, cb) {
  var t = document.getElementById('typing-' + v);
  t.classList.add('show');
  var m = document.getElementById('msgs-' + v);
  m.scrollTop = m.scrollHeight;
  setTimeout(cb, 1600);
}

function readPage() {
  var w = document.querySelector('.pane-wrap.active');
  var u = new SpeechSynthesisUtterance(w.innerText.replace(/\n+/g, ' '));
  u.rate = 0.88;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

window.addEventListener('load', init);
</script>
